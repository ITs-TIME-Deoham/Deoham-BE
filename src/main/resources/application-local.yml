spring:
  docker:
    compose:
      file: compose-local.yaml
  datasource:
    url: jdbc:postgresql://localhost:5300/deoham
    username: deoham
    password: deoham
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
deoham:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000,https://ondo-fe.vercel.app
  jwt:
    secret: deoham-local-dev-secret-key-do-not-use-in-production-1234
    access-token-expiry-seconds: 3600
    refresh-token-expiry-seconds: 1209600
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY:dummy-for-local}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/api/auth/kakao/callback}
  s3:
    region: ${AWS_S3_REGION:ap-northeast-2}
    bucket: ${AWS_S3_BUCKET:ondo-2026-itstime}

fcm:
  service-account-key-path: src/main/resources/firebase/local-service-account.json

logging:
  level:
    com.deoham: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.security: DEBUG
