spring:
  application:
    name: deoham-be
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  compression:
    enabled: true

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

deoham:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  supabase:
    jwt:
      issuer: ${SUPABASE_JWT_ISSUER}
      jwks-uri: ${SUPABASE_JWT_JWKS_URI}
      audience: ${SUPABASE_JWT_AUDIENCE:authenticated}
    auth:
      url: ${SUPABASE_URL}
      anon-key: ${SUPABASE_ANON_KEY}
      redirect-url: ${SUPABASE_REDIRECT_URL}
  s3:
    region: ${AWS_S3_REGION:ap-northeast-2}
    bucket: ${AWS_S3_BUCKET}
    presigned-url-ttl-seconds: ${AWS_S3_PRESIGNED_TTL:600}

logging:
  level:
    root: INFO
    com.deoham: INFO
