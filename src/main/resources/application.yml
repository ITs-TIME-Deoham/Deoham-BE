spring:
  application:
    name: deoham-be
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  compression:
    enabled: true

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    try-it-out-enabled: true
    display-request-duration: true
    filter: true
    disable-swagger-default-url: true
    default-models-expand-depth: 1
  api-docs:
    path: /v3/api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  show-actuator: false

deoham:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://ondo-fe.vercel.app}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-seconds: ${JWT_ACCESS_EXPIRY:3600}
    refresh-token-expiry-seconds: ${JWT_REFRESH_EXPIRY:1209600}
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY}
    redirect-uri: ${KAKAO_REDIRECT_URI}
  s3:
    region: ${AWS_S3_REGION:ap-northeast-2}
    bucket: ${AWS_S3_BUCKET}
    presigned-url-ttl-seconds: ${AWS_S3_PRESIGNED_TTL:600}

fcm:
  service-account-key-path: ${FCM_KEY_PATH}

logging:
  level:
    root: INFO
    com.deoham: INFO
