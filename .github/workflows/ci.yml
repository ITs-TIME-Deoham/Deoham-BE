name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew --no-daemon clean build

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            build/libs/*.jar
            Dockerfile.deploy
            compose.yaml

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files

      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Create .env
        run: |
          cat > .env << 'ENVEOF'
          SPRING_PROFILES_ACTIVE=prod

          # DataSource — compose 내부 postgres 컨테이너
          SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/deoham
          SPRING_DATASOURCE_USERNAME=deoham
          SPRING_DATASOURCE_PASSWORD=deoham

          # Redis — compose 내부 redis 컨테이너
          SPRING_DATA_REDIS_HOST=redis
          SPRING_DATA_REDIS_PORT=6379
          SPRING_DATA_REDIS_SSL=false

          # AWS S3 (필수 — @NotBlank/@Positive, EC2 IAM 역할로 자격증명 자동 처리)
          AWS_S3_REGION=${{ secrets.AWS_S3_REGION }}
          AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
          AWS_S3_PRESIGNED_TTL=${{ secrets.AWS_S3_PRESIGNED_TTL }}

          # CORS
          CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}

          # FCM — Java 바인딩 없음, 구현 완료 후 활성화
          # FCM_KEY_PATH=/app/secrets/fcm-service-account.json

          ENVEOF

      - name: Prepare EC2 directories
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
            "mkdir -p ~/deoham/build/libs"

      - name: Transfer files
        run: |
          scp -i private_key.pem -o StrictHostKeyChecking=no \
            Dockerfile.deploy compose.yaml .env \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/deoham/

          scp -i private_key.pem -o StrictHostKeyChecking=no \
            build/libs/*.jar \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/deoham/build/libs/

      - name: Deploy on EC2
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/deoham

            echo "=== Cleaning old images ==="
            docker compose down || true
            docker image prune -af || true

            echo "=== Building and starting containers ==="
            docker compose up -d --build

            echo "=== Waiting for startup (30s) ==="
            sleep 30

            echo "=== Health check ==="
            healthy=0
            for i in $(seq 1 12); do
              if curl -sf http://localhost/actuator/health > /dev/null; then
                echo "Application is healthy"
                healthy=1
                break
              fi
              echo "Attempt $i/12 failed, retrying in 10s..."
              sleep 10
            done

            docker compose ps || true

            if [ "$healthy" -ne 1 ]; then
              echo "Health check failed — last 100 log lines:"
              docker compose logs --tail=100 app
              exit 1
            fi

            echo "=== Deploy succeeded ==="
          ENDSSH

      - name: Cleanup sensitive files
        if: always()
        run: rm -f private_key.pem .env
