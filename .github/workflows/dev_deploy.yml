name: Dev Deploy

on:
  push:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew bootJar -x test --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            build/libs/*.jar
            Dockerfile.deploy
            compose.yaml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files

      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Create .env
        run: |
          cat > .env << 'ENVEOF'
          SPRING_PROFILES_ACTIVE=prod

          # DataSource — compose 내부 postgres 컨테이너
          SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/deoham
          SPRING_DATASOURCE_USERNAME=deoham
          SPRING_DATASOURCE_PASSWORD=deoham

          # Redis — compose 내부 redis 컨테이너
          SPRING_DATA_REDIS_HOST=redis
          SPRING_DATA_REDIS_PORT=6379
          SPRING_DATA_REDIS_SSL=false

          # Supabase JWT
          SUPABASE_JWT_ISSUER=${{ secrets.SUPABASE_JWT_ISSUER }}
          SUPABASE_JWT_JWKS_URI=${{ secrets.SUPABASE_JWT_JWKS_URI }}
          SUPABASE_JWT_AUDIENCE=authenticated

          # AWS S3 (EC2 IAM 역할로 자격증명 자동 처리 — 키 불필요)
          AWS_S3_REGION=${{ secrets.AWS_S3_REGION }}
          AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
          AWS_S3_PRESIGNED_TTL=${{ secrets.AWS_S3_PRESIGNED_TTL }}

          # FCM
          FCM_KEY_PATH=/app/secrets/fcm-service-account.json

          # Kakao Map
          KAKAO_MAP_REST_API_KEY=${{ secrets.KAKAO_MAP_REST_API_KEY }}

          # CORS
          CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
          ENVEOF

      - name: Write FCM service account key
        run: echo '${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}' > fcm-service-account.json

      - name: Prepare EC2 directories
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
            "mkdir -p ~/deoham/build/libs ~/deoham/secrets"

      - name: Transfer files
        run: |
          scp -i private_key.pem -o StrictHostKeyChecking=no \
            Dockerfile.deploy compose.yaml .env \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/deoham/

          scp -i private_key.pem -o StrictHostKeyChecking=no \
            build/libs/*.jar \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/deoham/build/libs/

          scp -i private_key.pem -o StrictHostKeyChecking=no \
            fcm-service-account.json \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/deoham/secrets/

      - name: Deploy on EC2
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/deoham

            echo "=== Cleaning old images ==="
            docker compose down || true
            docker image prune -af || true

            echo "=== Building and starting containers ==="
            docker compose up -d --build

            echo "=== Waiting for startup (30s) ==="
            sleep 30

            echo "=== Health check ==="
            for i in $(seq 1 6); do
              if curl -sf http://localhost/actuator/health > /dev/null; then
                echo "Application is healthy"
                docker compose ps
                exit 0
              fi
              echo "Attempt $i/6 failed, retrying in 10s..."
              sleep 10
            done

            echo "Health check failed — last 100 log lines:"
            docker compose logs --tail=100 app
            exit 1
          ENDSSH

      - name: Cleanup sensitive files
        if: always()
        run: rm -f private_key.pem .env fcm-service-account.json
