name: Dev Deploy

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-develop
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JAR
        run: chmod +x gradlew && ./gradlew --no-daemon bootJar -x test

      - name: Build Docker image
        run: docker build -f Dockerfile.deploy -t deoham-app:latest .

      - name: Save Docker image
        run: docker save deoham-app:latest | gzip > deoham-app.tar.gz

      - name: Write .env
        run: |
          cat > deploy.env << 'EOF'
          SPRING_PROFILES_ACTIVE=prod
          SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          SPRING_DATA_REDIS_HOST=${{ secrets.SPRING_DATA_REDIS_HOST }}
          SPRING_DATA_REDIS_PORT=${{ secrets.SPRING_DATA_REDIS_PORT }}
          SPRING_DATA_REDIS_PASSWORD=${{ secrets.SPRING_DATA_REDIS_PASSWORD }}
          SPRING_DATA_REDIS_SSL=${{ secrets.SPRING_DATA_REDIS_SSL }}
          SUPABASE_JWT_ISSUER=${{ secrets.SUPABASE_JWT_ISSUER }}
          SUPABASE_JWT_JWKS_URI=${{ secrets.SUPABASE_JWT_JWKS_URI }}
          SUPABASE_JWT_AUDIENCE=${{ secrets.SUPABASE_JWT_AUDIENCE }}
          AWS_S3_REGION=${{ secrets.AWS_S3_REGION }}
          AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
          AWS_S3_PRESIGNED_TTL=${{ secrets.AWS_S3_PRESIGNED_TTL }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
          EOF

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Transfer files to EC2
        run: |
          scp -i private_key.pem -o StrictHostKeyChecking=no \
            deoham-app.tar.gz ubuntu@${{ secrets.EC2_HOST }}:~/
          scp -i private_key.pem -o StrictHostKeyChecking=no \
            deploy.env ubuntu@${{ secrets.EC2_HOST }}:~/deoham.env

      - name: Deploy on EC2
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} '
            set -e

            echo "=== Loading Docker image ==="
            docker load < ~/deoham-app.tar.gz
            rm -f ~/deoham-app.tar.gz

            echo "=== Restarting container ==="
            docker stop deoham 2>/dev/null || true
            docker rm deoham 2>/dev/null || true
            docker run -d \
              --name deoham \
              --env-file ~/deoham.env \
              -p 8080:8080 \
              --restart unless-stopped \
              deoham-app:latest

            echo "=== Health check ==="
            sleep 20
            for i in $(seq 1 6); do
              if curl -sf http://localhost:8080/actuator/health > /dev/null; then
                echo "Health check passed"
                break
              fi
              if [ $i -eq 6 ]; then
                echo "Health check failed"
                docker logs deoham --tail=50
                exit 1
              fi
              echo "Attempt $i/6 - waiting 10s..."
              sleep 10
            done

            echo "=== Cleaning up old images ==="
            docker image prune -f
          '

      - name: Cleanup local files
        if: always()
        run: rm -f private_key.pem deploy.env deoham-app.tar.gz
