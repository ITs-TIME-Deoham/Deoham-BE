services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    env_file:
      - .env
    # volumes:
    #   - ./secrets/fcm-service-account.json:/app/secrets/fcm-service-account.json:ro
    ports:
      - "80:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: deoham
      POSTGRES_USER: deoham
      POSTGRES_PASSWORD: deoham
    ports:
      - "5432:5432"
    volumes:
      - deoham_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deoham -d deoham"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - deoham_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  deoham_pg_data:
  deoham_redis_data:
